<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>PWA Domain Extender - Settings</title>
<link rel="stylesheet" href="common.css">
<style>
  /* ===== Page Layout ===== */
  body {
    max-width: 840px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  h1 {
    font-size: var(--font-size-xl);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: var(--font-size-base);
    margin-bottom: var(--space-2xl);
  }

  /* ===== Toolbar ===== */
  .toolbar {
    display: flex;
    gap: var(--space-sm);
    margin-bottom: var(--space-xl);
    flex-wrap: wrap;
    align-items: center;
  }

  /* ===== Rule Card ===== */
  .rule-card {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-left: var(--accent-bar) solid var(--primary);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
    margin-bottom: var(--space-md);
    box-shadow: var(--shadow-xs);
    transition: box-shadow var(--transition-fast),
                border-left-color var(--transition-fast),
                opacity var(--transition-fast);
  }

  .rule-card:hover {
    box-shadow: var(--shadow-sm);
  }

  .rule-card:has(.switch input:not(:checked)) {
    border-left-color: var(--border);
    opacity: 0.7;
  }

  .rule-card:has(.switch input:not(:checked)):hover {
    opacity: 0.85;
  }

  /* ===== Rule Header ===== */
  .rule-header {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    margin-bottom: var(--space-md);
    flex-wrap: wrap;
  }

  .rule-header > label {
    font-size: var(--font-size-xs);
    color: var(--text-muted);
    min-width: 50px;
    margin-bottom: 0;
    flex-shrink: 0;
  }

  .rule-header input[type="text"] {
    flex: 1;
    min-width: 160px;
  }

  /* ===== Patterns ===== */
  .patterns-wrap {
    position: relative;
    margin-bottom: var(--space-md);
  }

  .patterns-wrap > label {
    font-size: var(--font-size-xs);
    color: var(--text-muted);
    display: block;
    margin-bottom: var(--space-xs);
  }

  .patterns-wrap textarea {
    width: 100%;
    min-height: 80px;
    max-height: 200px;
  }

  /* ===== Rule Actions ===== */
  .rule-actions {
    display: flex;
    justify-content: flex-end;
    gap: var(--space-sm);
  }

  /* ===== Empty State ===== */
  .empty-state {
    text-align: center;
    padding: 64px 20px;
    color: var(--text-muted);
    user-select: none;
  }

  .empty-state::before {
    content: "";
    display: block;
    width: 48px;
    height: 48px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: var(--surface-variant);
  }

  .empty-state p {
    font-size: var(--font-size-base);
    margin-bottom: var(--space-sm);
  }

  .empty-state p:first-of-type {
    font-size: var(--font-size-md);
    font-weight: 500;
    color: var(--text-secondary);
  }

  /* ===== Horizontal Rule ===== */
  hr {
    border: none;
    border-top: 1px solid var(--border-light);
    margin: var(--space-2xl) 0;
  }

  .footer-hint {
    font-size: var(--font-size-sm);
    color: var(--text-muted);
  }

  /* ===== Modal ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }

  .modal-overlay.show {
    display: flex;
  }

  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: var(--space-2xl);
    max-width: 420px;
    width: 90%;
    box-shadow: var(--shadow-lg);
  }

  .modal h3 {
    margin-bottom: var(--space-md);
    font-size: var(--font-size-lg);
  }

  .modal p {
    font-size: var(--font-size-base);
    color: var(--text-secondary);
    margin-bottom: var(--space-lg);
    line-height: 1.6;
  }

  .modal-actions {
    display: flex;
    gap: var(--space-sm);
    justify-content: flex-end;
  }

  /* ===== Responsive ===== */
  @media (max-width: 480px) {
    body {
      padding: 16px 12px 60px;
    }

    .rule-header {
      flex-direction: column;
      align-items: stretch;
    }

    .rule-header .btn-danger {
      align-self: flex-end;
    }

    .toolbar .btn {
      flex: 1;
      min-width: 0;
    }
  }
</style>
</head>
<body>

<h1>PWA Domain Extender</h1>
<p class="subtitle">管理所有域名扩展规则，配置导入导出</p>

<div class="toolbar">
  <button class="btn btn-primary" id="addRule">+ 添加规则</button>
  <button class="btn" id="exportBtn">导出配置</button>
  <button class="btn" id="importBtn">导入配置</button>
  <input type="file" id="importFile" accept=".json" style="display:none">
</div>

<div id="ruleList"></div>

<div id="emptyState" class="empty-state" style="display:none">
  <p>暂无规则</p>
  <p>点击 "+ 添加规则" 开始配置</p>
</div>

<hr>
<p class="footer-hint">提示：点击扩展图标可快速编辑当前网站的规则</p>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h3>导入配置</h3>
    <p>选择导入方式：<br>"合并"会将导入的规则与现有规则合并，同名起始域名以导入文件为准。<br>"替换"会清空所有现有规则，仅保留导入的规则。</p>
    <div class="modal-actions">
      <button class="btn" id="importCancel">取消</button>
      <button class="btn" id="importMerge">合并</button>
      <button class="btn btn-primary" id="importReplace">替换</button>
    </div>
  </div>
</div>

<script src="options.js"></script>
</body>
</html>
