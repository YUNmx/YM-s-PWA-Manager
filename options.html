<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PWA Domain Extender - Settings</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #333;
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  h1 { font-size: 20px; margin-bottom: 8px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }

  .toolbar {
    display: flex; gap: 8px; margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 8px 16px; border: 1px solid #ccc; border-radius: 6px;
    cursor: pointer; font-size: 13px; background: #fff;
    display: inline-flex; align-items: center; gap: 4px;
    transition: background .15s;
  }
  .btn:hover { background: #f0f0f0; }
  .btn-primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
  .btn-primary:hover { background: #1557b0; }
  .btn-danger { color: #d93025; border-color: #d93025; }
  .btn-danger:hover { background: #fce8e6; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  .rule-card {
    background: #fff; border-radius: 8px; padding: 16px;
    margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .rule-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
  }
  .rule-header label { font-size: 12px; color: #888; min-width: 50px; }
  .rule-header input {
    flex:1; padding: 6px 10px; border:1px solid #ddd; border-radius:4px;
    font-size: 13px; font-family: monospace;
  }
  .switch {
    position: relative; display: inline-block; width: 40px; height: 22px;
    flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; top:0; left:0; right:0; bottom:0;
    background: #ccc; border-radius: 22px; transition: .2s;
  }
  .slider:before {
    position: absolute; content: ""; height: 16px; width: 16px;
    left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s;
  }
  input:checked + .slider { background: #1a73e8; }
  input:checked + .slider:before { transform: translateX(18px); }

  .patterns-wrap { position: relative; }
  .patterns-wrap label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  .patterns-wrap textarea {
    width: 100%; padding: 8px; border:1px solid #ddd; border-radius:4px;
    font-size: 13px; font-family: monospace; resize: vertical;
    min-height: 80px;
  }
  .rule-actions {
    display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px;
  }

  .empty-state {
    text-align: center; padding: 60px 20px; color: #aaa;
  }
  .empty-state p { margin-bottom: 12px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 24px; border-radius: 20px;
    font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; }

  .modal-overlay {
    display: none; position: fixed; inset:0; background: rgba(0,0,0,.4);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; padding: 24px;
    max-width: 420px; width: 90%;
  }
  .modal h3 { margin-bottom: 12px; }
  .modal p { font-size: 13px; color: #666; margin-bottom: 16px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  hr { border: none; border-top: 1px solid #eee; margin: 24px 0; }
</style>
</head>
<body>

<h1>PWA Domain Extender</h1>
<p class="subtitle">管理所有域名扩展规则，配置导入导出</p>

<div class="toolbar">
  <button class="btn btn-primary" id="addRule">+ 添加规则</button>
  <button class="btn" id="exportBtn">导出配置</button>
  <button class="btn" id="importBtn">导入配置</button>
  <input type="file" id="importFile" accept=".json" style="display:none">
</div>

<div id="ruleList"></div>

<div id="emptyState" class="empty-state" style="display:none">
  <p>暂无规则</p>
  <p>点击 "+ 添加规则" 开始配置</p>
</div>

<hr>
<p style="font-size:12px;color:#aaa;">提示：点击扩展图标可快速编辑当前网站的规则</p>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h3>导入配置</h3>
    <p>选择导入方式：<br>"合并"会将导入的规则与现有规则合并，同名起始域名以导入文件为准。<br>"替换"会清空所有现有规则，仅保留导入的规则。</p>
    <div class="modal-actions">
      <button class="btn" id="importCancel">取消</button>
      <button class="btn" id="importMerge">合并</button>
      <button class="btn btn-primary" id="importReplace">替换</button>
    </div>
  </div>
</div>

<script src="options.js"></script>
</body>
</html>
