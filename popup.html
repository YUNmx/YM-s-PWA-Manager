<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="common.css">
<style>
  body {
    width: 320px;
    margin: 0;
    padding: 0;
    background: var(--bg);
    overflow: hidden;
  }

  /* ===== Header ===== */
  .popup-header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border-light);
  }

  .popup-brand {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
  }

  .popup-logo {
    width: 28px;
    height: 28px;
    border-radius: var(--radius-xs);
    background: var(--primary);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
    user-select: none;
  }

  .popup-title {
    font-size: var(--font-size-md);
    font-weight: 600;
    color: var(--text-primary);
    margin: 0;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .popup-subtitle {
    font-size: var(--font-size-xs);
    color: var(--text-muted);
    margin: 2px 0 0 36px;
  }

  /* ===== Main ===== */
  .popup-main {
    padding: 12px 16px 0;
  }

  .field-group {
    margin-bottom: 10px;
  }

  .field-group label {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: var(--font-size-sm);
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: var(--space-xs);
  }

  .field-hint {
    font-size: var(--font-size-xs);
    color: var(--text-muted);
    margin-top: 2px;
  }

  .popup-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 6px;
  }

  /* ===== Footer ===== */
  .popup-footer {
    padding: 6px 16px 10px;
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .status-bar {
    font-size: var(--font-size-xs);
    font-weight: 500;
    text-align: center;
    min-height: 18px;
    line-height: 18px;
    color: var(--success);
    transition: opacity var(--transition-fast);
    width: 100%;
  }
</style>
</head>
<body>
  <header class="popup-header">
    <div class="popup-brand">
      <div class="popup-logo" aria-hidden="true">P</div>
      <h1 class="popup-title">PWA Domain Extender</h1>
    </div>
    <p class="popup-subtitle">配置跨域导航规则</p>
  </header>

  <main class="popup-main">
    <div class="field-group">
      <label for="origin">当前站点</label>
      <input type="text" id="origin"
             placeholder="自动从当前标签页检测"
             autocomplete="off">
      <p class="field-hint">自动检测当前标签页域名，可手动修改</p>
    </div>

    <div class="field-group">
      <label for="patterns">允许的域名</label>
      <textarea id="patterns" rows="5"
                placeholder="每行一个域名，支持通配符 *
例如：
  *.example.com
  sub.domain.org
  api.other-site.com"></textarea>
      <p class="field-hint">匹配这些域名的链接将在 PWA 窗口内打开，不会跳出</p>
    </div>

    <div class="popup-actions">
      <button id="save" class="btn btn-primary">保存配置</button>
      <button id="openSettings" class="btn">管理所有规则</button>
    </div>
  </main>

  <footer class="popup-footer">
    <div id="status" class="status-bar"></div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
